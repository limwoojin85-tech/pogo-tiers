name: Update & Deploy

on:
  schedule:
    - cron: '0 21 * * *'      # UTC 21:00 = KST 06:00 매일
  workflow_dispatch:           # 수동 실행 버튼
  push:
    branches: [main]
    paths:
      - '**.py'
      - '.github/workflows/update.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run update pipeline
        run: python update.py --force

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
